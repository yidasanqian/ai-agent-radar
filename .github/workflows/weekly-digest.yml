name: Weekly AI Agent Radar

on:
  schedule:
    # 每周一 01:00 UTC = 09:00 CST，日报运行后1小时
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run weekly rollup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || secrets.ANTHROPIC_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.ANTHROPIC_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || secrets.ANTHROPIC_MODEL }}
          REPORT_LANGS: ${{ vars.REPORT_LANGS || secrets.REPORT_LANGS }}
        run: pnpm weekly

      - name: Commit weekly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No weekly report to commit"
          else
            WEEK=$(date -u +%Y-W%V)
            git commit -m "digest: ${WEEK} weekly digest"
            git pull --rebase
            git push
          fi

      - name: Update web manifest
        env:
          DIGEST_REPO: ${{ github.repository }}
          PAGES_URL: ${{ vars.PAGES_URL || secrets.PAGES_URL }}
          REPORT_LANGS: ${{ vars.REPORT_LANGS || secrets.REPORT_LANGS }}
        run: pnpm manifest

      - name: Commit manifest and feed
        run: |
          git add manifest.json feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update manifest.json"
            git pull --rebase
            git push
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_REPO: ${{ github.repository }}
          PAGES_URL: ${{ vars.PAGES_URL || secrets.PAGES_URL }}
          REPORT_LANGS: ${{ vars.REPORT_LANGS || secrets.REPORT_LANGS }}
        run: pnpm notify
